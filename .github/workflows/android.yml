name: Android CI/CD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: [qa, stg]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Change environment in manifest
        run: |
          sed -i 's/android:value="qa"/android:value="${{ matrix.environment }}"/g' app/src/main/AndroidManifest.xml

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.environment }}
          path: app/build/outputs/apk/release/*.apk